root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/codex-lb-go ./cmd/codex-lb-go"
bin = "./tmp/air/codex-lb-go"
full_bin = "CODEX_LB_GO_AUTH_DISABLED=${CODEX_LB_GO_AUTH_DISABLED:-1} CODEX_LB_GO_PORT=${CODEX_LB_GO_PORT:-${DEV_API_PORT:-2455}} ./tmp/air/codex-lb-go"
include_ext = ["go", "toml"]
include_dir = ["cmd", "internal", "migrations", "queries"]
include_file = ["go.mod", "go.sum", ".air.toml"]
exclude_dir = [
  ".git",
  ".venv",
  ".worktrees",
  "app",
  "build",
  "dist",
  "docs",
  "frontend",
  "node_modules",
  "tmp",
  "vendor"
]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = false
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = false
